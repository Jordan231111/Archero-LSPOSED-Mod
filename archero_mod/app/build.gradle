plugins {
    id 'com.android.application'
}

android {
    namespace 'com.archero.mod'
    compileSdk 33

    defaultConfig {
        applicationId "com.archero.mod"
        minSdk 24
        targetSdk 33
        versionCode 1
        versionName "1.0"
        
        externalNativeBuild {
            cmake {
                cppFlags "-std=c++11"
                abiFilters "arm64-v8a"
            }
        }
    }

    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
        }
    }

    packaging {
        jniLibs {
            // LSPosed module classloader loads from base.apk!/lib/... path.
            // Keep native libs uncompressed (Stored), like working modules.
            useLegacyPackaging = false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    compileOnly 'de.robv.android.xposed:api:82'
}